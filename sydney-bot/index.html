<body data-mode="creative">
<div class="bg-glow"></div>
<div class="app">
<header class="hero">
  <div class="brand-slot" aria-label="品牌图片预留位"><img id="brandImage" alt=""></div>
  <h1>AI 驱动的 Web 副驾驶</h1>
</header>
<main class="main" id="mainScroll">
  <section class="welcome" id="welcome">
    <div class="suggestions" id="suggestions"></div>
    <div class="fineprint">AI 可能会出现意外或错误，请核对重要信息。</div>
    <div class="mode-title">选择对话风格</div>
    <div class="modes" role="tablist" aria-label="对话风格">
      <button class="mode active" data-mode="creative"><small>更多</small>创造性</button>
      <button class="mode" data-mode="balanced"><small>更多</small>平衡</button>
      <button class="mode" data-mode="precise"><small>更多</small>精准</button>
    </div>
  </section>
  <section class="chat" id="chat" aria-live="polite"></section>
</main>
<section class="composer-zone">
  <div class="composer">
    <button class="new-chat-btn" id="newChatButton" aria-label="开始新对话" title="开始新对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4"></path><path d="M18 2v6m-3-3h6"></path></svg>
    </button>
    <div class="input-wrap">
      <textarea id="input" maxlength="4000" rows="1" placeholder="在这里输入消息"></textarea>
      <div class="input-meta"><span id="count">0</span>/4000</div>
    </div>
    <button class="send-btn" id="sendButton" aria-label="发送">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.4 20.4 21 12 3.4 3.6l.1 6.5 11.7 1.9-11.7 1.9-.1 6.5Z"></path></svg>
    </button>
  </div>
  <div class="footer">由 AI 提供支持，结果可能包含错误。</div>
</section>
</div>
<button class="api-fab" id="apiFab" aria-label="设置 API Key" title="设置 API Key">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="15" r="4"></circle><path d="M11 12 20 3m-2 2 2 2m-5 1 2 2"></path></svg>
</button>
<div class="api-popover" id="apiPopover" role="dialog" aria-modal="true" aria-labelledby="apiTitle">
  <div class="api-card">
    <h2 id="apiTitle">DeepSeek API Key</h2>
    <p>API 密钥只保存在当前浏览器的 localStorage 中，不会写入项目文件。</p>
    <input id="apiInput" type="password" autocomplete="off" placeholder="sk-...">
    <div class="api-actions"><button class="close" id="apiClose">取消</button><button class="save" id="apiSave">保存</button></div>
  </div>
</div>
<script>
const MODEL='deepseek-v4-pro';
const ENDPOINT='https://api.deepseek.com/beta/completions';
const SEPARATOR='全新的对话      Bing AI:你好，这是Bing。我今天能怎么帮助你？😊';
const BUBBLE_RULE='';
const MODES={creative:{temperature:.3,chunk:()=>6+Math.floor(Math.random()*4),delay:()=>300+Math.random()*700},balanced:{temperature:.5,chunk:()=>1,delay:()=>50},precise:{temperature:.1,chunk:()=>6+Math.floor(Math.random()*4),delay:()=>300+Math.random()*700}};
const RESET_RE=/[“"]?-{3,}(?:\s|<br\s*\/?>)*全新的对话[”"]?/i;
const SUGGESTIONS=[['💬 聊天','时尚的下一个趋势是什么，我应该在哪里购物才能找到它？'],['▦ 组织','创建一张桌子，帮助我计划接下来两周的膳食'],['⚖ 比较','预算有限的六口之家的前三名车辆是什么？'],['🪄 创造','为专门测评的新社交媒体平台创建一个口号'],['🏷 店','什么是最受好评的咖啡研磨机？'],['🙂 笑','写一个我的同事会觉得有趣的笑话'],['📝 写','写一个关于鱼和青蛙寻找爱情的原创寓言']];
let promptText='';
let mode=localStorage.getItem('sydney-mode')||'creative';
let messages=[];
let generating=false;
const $=s=>document.querySelector(s);const chat=$('#chat'),welcome=$('#welcome'),input=$('#input'),send=$('#sendButton'),main=$('#mainScroll');
const md=window.markdownit?window.markdownit({html:false,linkify:true,breaks:true,typographer:false}):null;
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function renderRichContent(root,text){
  if(!md){root.textContent=text;return}
  root.classList.add('rich-content');root.innerHTML=md.render(text);
  root.querySelectorAll('a').forEach(a=>{a.target='_blank';a.rel='noopener noreferrer'});
  root.querySelectorAll('pre').forEach(pre=>{
    const code=pre.querySelector('code');if(!code)return;
    const language=(code.className.match(/language-([^\s]+)/)||[])[1]||'代码';
    const box=document.createElement('div');box.className='code-block';
    const bar=document.createElement('div');bar.className='code-toolbar';
    const label=document.createElement('span');label.textContent=language;
    const button=document.createElement('button');button.className='code-copy';button.type='button';button.textContent='复制代码';
    button.onclick=async()=>{await copyText(code.textContent);button.textContent='已复制';setTimeout(()=>button.textContent='复制代码',1200)};
    bar.append(label,button);pre.parentNode.insertBefore(box,pre);box.append(bar,pre)
  });
  if(window.renderMathInElement)renderMathInElement(root,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'\\(',right:'\\)',display:false},{left:'$',right:'$',display:false}],throwOnError:false,strict:false,ignoredTags:['script','noscript','style','textarea','pre','code']})
}
function loadBrand(){const img=$('#brandImage'),files=['logo.png','logo.webp','logo.jpg','logo.jpeg','brand.png','brand.webp','brand.jpg'];let i=0;const next=()=>{if(i>=files.length)return;img.onload=()=>img.classList.add('loaded');img.onerror=()=>{img.classList.remove('loaded');next()};img.src=files[i++]};next()}
async function loadPrompt(){try{const r=await fetch('./prompt-a.txt',{cache:'no-store'});if(!r.ok)throw 0;promptText=await r.text()}catch{promptText='你是 Bing AI。'}}
function setMode(next){mode=next;document.body.dataset.mode=next;localStorage.setItem('sydney-mode',next);document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===next));document.querySelector('meta[name="theme-color"]').content=getComputedStyle(document.body).getPropertyValue('--bg').trim()}
function buildSuggestions(){const box=$('#suggestions');box.innerHTML='';SUGGESTIONS.forEach((s,i)=>{const b=document.createElement('button');b.className='suggestion'+(i>3?' wide':'');b.innerHTML=`<div class="tag">${esc(s[0])}</div><div class="prompt">${esc(s[1])}</div>`;b.onclick=()=>{input.value=s[1];resizeInput();input.focus()};box.appendChild(b)})}
function actionButtons(m,i){const wrap=document.createElement('div');wrap.className='message-actions';const copy=document.createElement('button');copy.textContent='复制';copy.title='复制';copy.setAttribute('aria-label','复制');copy.onclick=()=>copyText(m.content);wrap.appendChild(copy);if(m.role==='assistant'){const regen=document.createElement('button');regen.textContent='重新生成';regen.title='重新生成';regen.setAttribute('aria-label','重新生成');regen.disabled=generating;regen.onclick=()=>regenerate(i);wrap.appendChild(regen)}const del=document.createElement('button');del.textContent='删除';del.title='删除';del.setAttribute('aria-label','删除');del.disabled=generating;del.onclick=()=>{messages.splice(i,1);render()};wrap.appendChild(del);return wrap}
function render(){chat.innerHTML='';welcome.hidden=false;const assistantTotal=messages.filter(x=>x.role==='assistant').length;let assistantNo=0;messages.forEach((m,i)=>{if(m.role==='assistant')assistantNo++;const row=document.createElement('div');row.className='message-row '+m.role;if(m.entering){row.classList.add('entering');m.entering=false}const bubble=document.createElement('div');bubble.className='bubble';const content=document.createElement('div');content.className='message-content';if(m.generating&&!m.content){content.innerHTML='<span class="typing"><i></i><i></i><i></i></span>'}else if(m.role==='assistant'&&!m.generating){renderRichContent(content,m.content)}else content.textContent=m.content;bubble.appendChild(content);if(m.role==='assistant'&&!m.generating){const footer=document.createElement('div');footer.className='assistant-footer';footer.appendChild(actionButtons(m,i));const index=document.createElement('div');index.className='message-index';index.innerHTML=`${assistantNo} of ${assistantTotal} <i></i>`;footer.appendChild(index);bubble.appendChild(footer)}row.appendChild(bubble);if(m.role==='user'&&!m.generating)row.appendChild(actionButtons(m,i));chat.appendChild(row);if(m.reset){const reset=document.createElement('div');reset.className='reset-marker';reset.innerHTML='<div class="reset-top"><span class="reset-icon">△</span><span>也许该换个新话题了</span></div><div class="reset-sub">让我们重新开始吧</div>';chat.appendChild(reset)}});requestAnimationFrame(()=>{main.scrollTo({top:main.scrollHeight,behavior:'smooth'})});send.disabled=generating||!input.value.trim()}
async function copyText(text){try{await navigator.clipboard.writeText(text)}catch{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}}
function conversationBefore(index){return messages.slice(0,index).map(m=>(m.role==='user'?'罗斯：':'Bing AI：')+m.raw).join('\n\n')}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
async function streamCompletion(targetIndex){
  const apiKey=localStorage.getItem('deepseek-api-key')||'';
  if(!apiKey){openApi();throw new Error('请先设置 API Key')}
  const target=messages[targetIndex];
  target.content='';target.raw='';target.reset=false;target.generating=true;target.entering=true;
  render();generating=true;send.disabled=true;
  const token='Bing AI：',events=[];
  let streamDone=false,parseBuffer='',currentTarget=target,currentIndex=targetIndex,resetDetected=false,activeReader=null;
  const emitText=text=>{for(const char of text)events.push({type:'char',char})};
  const holdLength=text=>{for(let n=Math.min(token.length-1,text.length);n>0;n--)if(token.startsWith(text.slice(-n)))return n;return 0};
  const parseStreamText=text=>{
    if(resetDetected)return;
    parseBuffer+=text;
    while(true){
      const markerIndex=parseBuffer.indexOf(token);
      if(markerIndex>=0){emitText(parseBuffer.slice(0,markerIndex));events.push({type:'bubble'});parseBuffer=parseBuffer.slice(markerIndex+token.length);continue}
      const keep=holdLength(parseBuffer),safe=parseBuffer.slice(0,parseBuffer.length-keep);
      emitText(safe);parseBuffer=parseBuffer.slice(parseBuffer.length-keep);break
    }
  };
  const applyReset=()=>{
    const match=currentTarget.raw.match(RESET_RE);if(!match)return false;
    const kept=currentTarget.raw.slice(0,match.index).trimEnd();
    currentTarget.raw=kept;currentTarget.content=kept;currentTarget.reset=true;currentTarget.generating=false;
    resetDetected=true;events.length=0;parseBuffer='';streamDone=true;
    if(activeReader)activeReader.cancel().catch(()=>{});
    render();return true
  };
  const typer=(async()=>{
    while(!streamDone||events.length){
      const event=events.shift();
      if(!event){await sleep(12);continue}
      if(event.type==='bubble'){
        currentTarget.generating=false;
        const next={role:'assistant',content:'',raw:'',reset:false,generating:true,entering:true};
        currentIndex+=1;messages.splice(currentIndex,0,next);currentTarget=next;render();continue
      }
      const config=MODES[mode],chunkSize=config.chunk();
      const leadingChars=()=>{let count=0;while(events[count]?.type==='char')count++;return count};
      while(!streamDone&&1+leadingChars()<chunkSize&&events[leadingChars()]?.type!=='bubble')await sleep(12);
      let output=event.char,taken=1;while(taken<chunkSize&&events[0]?.type==='char'){output+=events.shift().char;taken++}
      currentTarget.content+=output;currentTarget.raw+=output;
      if(applyReset())break;
      render();await sleep(config.delay())
    }
  })();
  try{
    const formal=conversationBefore(targetIndex);
    const fullPrompt=`${promptText.trimEnd()}\n\n${BUBBLE_RULE}\n\n${SEPARATOR}\n\n${formal}\n\nBing AI：`;
    const response=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${apiKey.trim()}`},body:JSON.stringify({model:MODEL,prompt:fullPrompt,max_tokens:1200,temperature:MODES[mode].temperature,top_p:.95,stream:true,stop:['\n罗斯：','罗斯：'],echo:false})});
    if(!response.ok)throw new Error(`HTTP ${response.status} - ${(await response.text()).slice(0,240)}`);
    activeReader=response.body&&response.body.getReader();if(!activeReader)throw new Error('浏览器不支持流式读取');
    const decoder=new TextDecoder();let buffer='';
    while(!resetDetected){
      const {done,value}=await activeReader.read();if(done)break;
      buffer+=decoder.decode(value,{stream:true});const lines=buffer.split('\n');buffer=lines.pop()||'';
      for(const line of lines){const t=line.trim();if(!t.startsWith('data:'))continue;const data=t.replace(/^data:\s*/,'');if(data==='[DONE]')continue;try{const text=JSON.parse(data).choices?.[0]?.text||'';if(text)parseStreamText(text)}catch{}}
    }
    if(!resetDetected){emitText(parseBuffer);parseBuffer=''}
    streamDone=true;await typer;currentTarget.generating=false
  }catch(err){
    if(!resetDetected){emitText(parseBuffer);parseBuffer='';streamDone=true;await typer;currentTarget.generating=false;if(!target.content&&messages[targetIndex]===target)messages.splice(targetIndex,1);const e=document.createElement('div');e.className='error';e.textContent=err.message||String(err);chat.appendChild(e)}
  }finally{generating=false;render()}
}
async function sendMessage(){const text=input.value.trim();if(!text||generating)return;messages.push({role:'user',content:text,raw:text,reset:false,generating:false,entering:true});input.value='';resizeInput();const idx=messages.length;messages.push({role:'assistant',content:'',raw:'',reset:false,generating:true,entering:true});render();await streamCompletion(idx)}
async function regenerate(index){if(generating||messages[index]?.role!=='assistant')return;await streamCompletion(index)}
function resizeInput(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,130)+'px';$('#count').textContent=input.value.length;send.disabled=generating||!input.value.trim()}
function openApi(){$('#apiInput').value=localStorage.getItem('deepseek-api-key')||'';$('#apiPopover').classList.add('open');setTimeout(()=>$('#apiInput').focus(),30)}
function closeApi(){$('#apiPopover').classList.remove('open')}
$('#newChatButton').onclick=()=>{if(!messages.length||confirm('开始新对话？当前对话将被清空。')){messages=[];render();main.scrollTo({top:0,behavior:'smooth'});input.focus()}};$('#apiFab').onclick=openApi;$('#apiClose').onclick=closeApi;$('#apiSave').onclick=()=>{localStorage.setItem('deepseek-api-key',$('#apiInput').value.trim());closeApi()};$('#apiPopover').onclick=e=>{if(e.target.id==='apiPopover')closeApi()};
input.addEventListener('input',resizeInput);input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});send.onclick=sendMessage;document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
loadBrand();buildSuggestions();setMode(mode);loadPrompt();resizeInput();render();
</script>
